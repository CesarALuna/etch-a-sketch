<!DOCTYPE html5>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Etch-a-Sketch</title>
  </head>

  <body>
    <div class="heading">
      <h1>Etch-a-Sketch</h1>
    </div>    
    <div class="buttons">
      <div class="sizeSlider">
        <p>Pixel Resolution</p>
        <input type="range" min="8" max="100" value="16" id="sizeRange" class="slider">
      </div>
      <button class="clear">Clear</button>
      <button class="color-choice" data-color="black" type="button">Black</button>
      <button class="color-choice" data-color="rainbow" type="button">Rainbow</button>
      <button class="color-choice" data-color="gray" type="button">Grays</button>
    </div>

    <div class="container-wrapper">
      <div class="container">
      </div>
    </div>



    <script src="script/app.js"></script>
  </body>
</html>
